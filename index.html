<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaGrant Portal</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.container{
  width:900px;
  display:flex;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* LEFT PANEL */
.left{
  width:45%;
  background:linear-gradient(135deg,#1e293b,#0f172a);
  padding:40px;
}

.left h1{
  font-size:28px;
}

.left p{
  opacity:0.7;
}

/* RIGHT PANEL */
.right{
  width:55%;
  background:white;
  color:black;
  padding:40px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

/* TAB */
.tabs{
  display:flex;
  margin-bottom:20px;
}

.tab{
  flex:1;
  text-align:center;
  padding:10px;
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.active{
  border-bottom:2px solid #2563eb;
  font-weight:bold;
}

/* HIDE */
.hidden{
  display:none;
}

.success{
  color:green;
  margin-top:10px;
}

.error{
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
  <h1>NexaGrant</h1>
  <p>NGO Management Portal</p>
  <br>
  <p>✔ Dashboard</p>
  <p>✔ Grant Tracking</p>
  <p>✔ Compliance Tools</p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="tabs">
  <div class="tab active" onclick="showLogin()">Login</div>
  <div class="tab" onclick="showRegister()">Register</div>
</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="text" id="loginUser" placeholder="Username">
  <input type="password" id="loginPass" placeholder="Password">
  <button onclick="login()">Sign In</button>
  <p id="loginMsg"></p>
</div>

<!-- REGISTER -->
<div id="register" class="hidden">
  <h2>Register NGO</h2>
  <input type="text" id="org" placeholder="Organisation Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="register()">Create Account</button>
  <p id="regMsg"></p>
</div>

</div>
</div>

<script>

/* SWITCH TABS */
function showLogin(){
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("register").classList.add("hidden");
  document.querySelectorAll(".tab")[0].classList.add("active");
  document.querySelectorAll(".tab")[1].classList.remove("active");
}

function showRegister(){
  document.getElementById("register").classList.remove("hidden");
  document.getElementById("login").classList.add("hidden");
  document.querySelectorAll(".tab")[1].classList.add("active");
  document.querySelectorAll(".tab")[0].classList.remove("active");
}

/* REGISTER */
function register(){
  let org = document.getElementById("org").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  if(org=="" || email=="" || pass==""){
    document.getElementById("regMsg").innerHTML="❌ Fill all fields";
    document.getElementById("regMsg").className="error";
    return;
  }

  localStorage.setItem("user", email);
  localStorage.setItem("pass", pass);

  document.getElementById("regMsg").innerHTML="✅ Registered Successfully!";
  document.getElementById("regMsg").className="success";
}

/* LOGIN */
function login(){
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if(user===savedUser && pass===savedPass){
    document.getElementById("loginMsg").innerHTML="✅ Login Success!";
    document.getElementById("loginMsg").className="success";
  } else {
    document.getElementById("loginMsg").innerHTML="❌ Invalid Credentials";
    document.getElementById("loginMsg").className="error";
  }
}

</script>

</body>
</html>
